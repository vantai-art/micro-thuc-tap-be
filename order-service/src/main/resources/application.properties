# ==========================================
# CẤU HÌNH SERVER & EUREKA
# ==========================================
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
server.port=8813
spring.application.name=order-service

# Đăng ký với Eureka Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ==========================================
# CẤU HÌNH DATABASE (MYSQL - XAMPP)
# ==========================================
# Tự động tạo database 'orders_db' nếu chưa tồn tại
spring.datasource.url=jdbc:mysql://localhost:3306/orders_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# ==========================================
# CẤU HÌNH REDIS (chỉ dùng cho Cart)
# ==========================================
# FIX: Chỉ giữ kết nối Redis cho CartRedisRepository
# Đã XÓA spring.session.store-type=redis vì @EnableRedisHttpSession đã bị bỏ
# Nếu giữ spring.session.store-type=redis mà không có @EnableRedisHttpSession
# Spring Boot vẫn tự bật Redis Session → 500 khi Redis chưa chạy
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.session.store-type=none