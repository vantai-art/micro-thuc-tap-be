# ==========================================
# CẤU HÌNH CƠ BẢN
# ==========================================
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
server.port=8080
spring.application.name=api-gateway
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
 
# ==========================================
# SPRING CLOUD GATEWAY ROUTES
# ==========================================
 
# 1. User service — /users, /users/**, /registration, /roles/**, /login/**, /auth/**
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/users, /users/**, /registration/**, /roles/**, /login/**, /auth/**
 
# 2. Product service — /products, /products/**, /admin/**
spring.cloud.gateway.routes[1].id=product-catalog-service
spring.cloud.gateway.routes[1].uri=lb://product-catalog-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/products, /products/**, /admin/**
spring.cloud.gateway.routes[1].filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
 
# 3. Recommendation service
spring.cloud.gateway.routes[2].id=product-recommendation-service
spring.cloud.gateway.routes[2].uri=lb://product-recommendation-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/*/recommendations/**, /recommendations/**
 
# 4. Order service — /order, /order/**, /cart/**, /tables, /tables/**
spring.cloud.gateway.routes[3].id=order-service
spring.cloud.gateway.routes[3].uri=lb://order-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/order, /order/**, /cart/**, /tables, /tables/**
 
# 5. Payment service — /api/payments/**
spring.cloud.gateway.routes[4].id=payment-service
spring.cloud.gateway.routes[4].uri=lb://payment-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/payments, /api/payments/**
 
# 6. Revenue routes — /api/revenue/** → forward to payment-service
# FIX: /api/revenue/** was missing, causing 404 on AdminRevenue page
spring.cloud.gateway.routes[5].id=revenue-service
spring.cloud.gateway.routes[5].uri=lb://payment-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/revenue, /api/revenue/**
 
# 7. Setting service — /settings/** (direct)
spring.cloud.gateway.routes[6].id=setting-service
spring.cloud.gateway.routes[6].uri=lb://setting-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/settings/**
spring.cloud.gateway.routes[6].filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
 
# 8. Setting service — /api/settings/** → strip /api → forward /settings/**
spring.cloud.gateway.routes[7].id=setting-service-api-prefix
spring.cloud.gateway.routes[7].uri=lb://setting-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/settings/**
spring.cloud.gateway.routes[7].filters[0]=RewritePath=/api/(?<segment>.*), /${segment}
spring.cloud.gateway.routes[7].filters[1]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
 
# 9. Bill service
spring.cloud.gateway.routes[8].id=bill-service
spring.cloud.gateway.routes[8].uri=lb://order-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/bills/**
 
# ==========================================
# SPRING SESSION & REDIS
# ==========================================
spring.session.store-type=none
 
# ==========================================
# CORS
# ==========================================
# CORS được cấu hình trong: config/CorsConfig.java
# ⚠️ KHÔNG dùng wildcard (*) khi có credentials: 'include' từ frontend
# CORS được cấu hình trong: config/CorsConfig.java
# Thêm origin mới vào danh sách ALLOWED_ORIGINS trong file đó
#
# spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=*  ← đã xóa (gây lỗi CORS với credentials)
# spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=*  ← đã xóa
# spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*  ← đã xóa