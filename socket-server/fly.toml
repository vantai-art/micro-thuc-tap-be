app = "ecom-socket-server"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  SOCKET_PORT = "5000"
  NODE_ENV = "production"

# Secrets (set bằng: flyctl secrets set KEY=value)
# ALLOWED_ORIGINS (nếu cần thêm origin frontend production)

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  # Bật WebSocket
  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
