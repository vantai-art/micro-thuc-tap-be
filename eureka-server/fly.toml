app = "ecom-eureka"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  SERVER_PORT = "8761"
  EUREKA_CLIENT_REGISTER_WITH_EUREKA = "false"
  EUREKA_CLIENT_FETCH_REGISTRY = "false"

[http_service]
  internal_port = 8761
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "90s"
    interval = "15s"
    method = "GET"
    path = "/actuator/health"
    port = 8761
    timeout = "10s"
    type = "http"
